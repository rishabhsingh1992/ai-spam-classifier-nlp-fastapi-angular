<section class="mx-auto flex w-full max-w-3xl flex-col gap-6">
  <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <div class="mb-4 flex items-center justify-between gap-3">
      <h1 class="text-xl font-semibold">Classify Message</h1>
      <a routerLink="/history" class="text-sm font-medium text-blue-600 hover:underline">View history</a>
    </div>

    <form (submit)="onSubmit(); $event.preventDefault()" class="space-y-4">
      <label for="message" class="block text-sm font-medium text-slate-700">Message text</label>
      <textarea
        id="message"
        name="message"
        rows="6"
        [value]="text"
        (input)="text = $any($event.target).value"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm outline-none ring-blue-500 focus:ring"
        placeholder="Paste the text you want to classify"
      ></textarea>

      <button
        type="submit"
        [disabled]="loading()"
        class="inline-flex items-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-slate-400"
      >
        {{ loading() ? 'Classifying...' : 'Classify' }}
      </button>
    </form>

    @if (error(); as errorMessage) {
      <p class="mt-4 text-sm text-red-600">{{ errorMessage }}</p>
    }
  </div>

  <app-result [result]="result()"></app-result>
</section>
